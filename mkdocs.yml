site_name: Linear Algebra Python
site_description: Python practice for 3Blue1Brown-style linear algebra learning
repo_name: venkatavikas69/linear-algebra-python
repo_url: https://github.com/venkatavikas69/linear-algebra-python
nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Notes:
      - Overview: notes.md
      - Chapter 1 - Vectors: chapter1_notes.md
      - Chapter 2 - Linear Combinations & Basis: chapter2_span_basis_notes.md
      - Chapter 3 - Linear Transformations: chapter3_linear_transformations_notes.md
  - Contributing: contributing.md
theme:
  name: readthedocs
  palette:
    scheme: default
    primary: indigo
    accent: blue
  font:
    text: 'Inter, Arial, sans-serif'
    code: 'Fira Code, monospace'
  logo: 'images/logo.svg'
extra_css:
  - css/custom.css
markdown_extensions:
  - toc:
      permalink: true
  - footnotes
  - tables
